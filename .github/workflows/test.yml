name: Run Tests

on:
  pull_request:
    # Run on pull requests targeting any branch
    branches:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DATA_TOKEN: ${{ secrets.TEST_DATA_TOKEN }}

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # Install dependencies
    - name: Install dependencies
      run: |
        pip install -r luwakx/requirements.txt
          
    # Cache test data
    - name: Cache test data
      uses: actions/cache@v3
      with:
        path: test_data, test_data_defacer
        key: ${{ runner.os }}-test-data-v1
        restore-keys: |
          ${{ runner.os }}-test-data-

    # Run tests
    - name: Run tests
      env:
        ZENTA_OPENAI_API_KEY: ${{ secrets.ZENTA_OPENAI_API_KEY }}
      run: |
        python -m unittest discover test -v
      