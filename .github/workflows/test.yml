name: Run Tests

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DATA_TOKEN: ${{ secrets.TEST_DATA_TOKEN }}

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # Install dependencies
    - name: Install dependencies
      run: |
        pip install --no-cache-dir -r requirements.txt
          
    # Restore test data cache
    - name: Restore test data cache
      uses: actions/cache/restore@v3
      with:
        path: |
          test_data
          test_data_defacer
          test_llm_cache
        key: ${{ runner.os }}-test-data-v1
        restore-keys: |
          ${{ runner.os }}-test-data-

    # Run tests
    - name: Run tests
      env:
        DEFACER_SIMULATE: 1
        CLEAN_DESCRIPTORS_LLM_SIMULATE: 1
      run: |
        echo "Disk space before tests:"
        df -h
        python -m unittest discover test -v
        echo "Disk space after tests:"
        df -h

    # Save test data cache
    - name: Save test data cache
      uses: actions/cache/save@v3
      if: always()  # Save cache even if tests fail
      with:
        path: |
          test_data
          test_data_defacer
          test_llm_cache
        key: ${{ runner.os }}-test-data-v1
